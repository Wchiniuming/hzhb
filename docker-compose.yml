version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: hzhb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hzhb_admin
      POSTGRES_PASSWORD: hzhb_password
      POSTGRES_DB: hzhb_dev
      # Enable pgAudit extension
      POSTGRES_INITDB_ARGS: '-E'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hzhb_admin -d hzhb_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hzhb-network

  minio:
    image: minio/minio:latest
    container_name: hzhb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hzhb-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  hzhb-network:
    driver: bridge
